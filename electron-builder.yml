appId: com.chronos.app
productName: "Mr. DIY - LOCAL"

directories:
  output: release

files:
  - ".vite/**/*"
  - "node_modules/**/*"
  - "package.json"

extraResources:
  - from: "server/dist/.env"
    to: "server/dist/.env"

  - from: "client/dist"
    to: "client/dist"

win:
  extraResources:
    - from: "server/dist/lbdc_server.exe"
      to: "server/dist/lbdc_server.exe"
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  icon: "resources/icon.ico"

mac:
  extraResources:
    - from: "server/dist/lbdc_server"
      to: "server/dist/lbdc_server"
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: "resources/icon.icns"

linux:
  extraResources:
    - from: "server/dist/lbdc_server"
      to: "server/dist/lbdc_server"
  target:
    - target: AppImage
      arch:
        - x64
  icon: "resources/icon.png"

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  runAfterFinish: true
  include: "installer.nsh"

publish:
  provider: github
  owner: kurtmayan
  repo: electron-lbdc
